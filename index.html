<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>记分板</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100%; height: 100%;
  position: relative;
  min-height: 0;
}

/* ===== Time ===== */
#time {
  text-align: center;
  font-size: clamp(14px, 3vw, 18px);
  color: #666;
  padding: 12px 0 4px;
  flex-shrink: 0;
  letter-spacing: 2px;
}

/* ===== Score Area ===== */
#score-area {
  flex: 1;
  display: flex;
  flex-direction: row;
  position: relative;
  gap: 2px;
}

#app.fs-mode #score-area {
  gap: 12px;
  min-height: 0;
  overflow: hidden;
}

.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  min-height: 0;
}

#app.fs-mode .team {
  overflow: hidden;
}

.team-label {
  font-size: clamp(20px, 5vw, 32px);
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.team-score {
  font-size: clamp(80px, 28vmin, 200px);
  font-weight: 900;
  line-height: 1;
  transition: transform 0.1s ease;
}

.team.blue .team-label { color: #3B82F6; }
.team.blue .team-score { color: #3B82F6; }

.team.red .team-label { color: #EF4444; }
.team.red .team-score { color: #EF4444; }

/* Score pop animation */
.score-pop { animation: pop 0.15s ease; }
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* ===== Hint ===== */
#hint {
  text-align: center;
  font-size: 12px;
  color: #444;
  padding: 6px 0;
  flex-shrink: 0;
  letter-spacing: 1px;
  min-height: 22px;
}

#hint.fullscreen-hint {
  color: #555;
  font-size: 13px;
}

/* ===== Buttons ===== */
#buttons {
  display: flex;
  gap: 12px;
  padding: 10px 20px 20px;
  flex-shrink: 0;
  justify-content: center;
}

.btn {
  flex: 1;
  max-width: 160px;
  padding: 14px 0;
  border: 2px solid #333;
  border-radius: 12px;
  background: transparent;
  color: #aaa;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn:active {
  background: #1a1a1a;
  border-color: #555;
  color: #fff;
}

.btn.fullscreen-btn {
  border-color: #3B82F6;
  color: #3B82F6;
}

.btn.fullscreen-btn:active {
  background: rgba(59,130,246,0.15);
}

/* ===== Panel Toggle ===== */
#panel-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #1a1a1a;
  border: 2px solid #333;
  color: #888;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 100;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

#panel-toggle:active {
  background: #333;
  color: #fff;
}

#panel-toggle.open {
  transform: rotate(90deg);
  background: #333;
  color: #fff;
}

/* ===== Panel ===== */
#panel {
  position: fixed;
  bottom: 84px;
  right: 12px;
  width: calc(100vw - 24px);
  max-width: 440px;
  max-height: 0;
  overflow: hidden;
  background: #111;
  border-radius: 16px;
  z-index: 99;
  transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.35s ease;
  opacity: 0;
  border: 0px solid #222;
}

#panel.open {
  max-height: calc(100vh - 110px);
  opacity: 1;
  border-width: 1px;
  overflow-y: auto;
}

#panel-inner {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.panel-section {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.panel-btn {
  flex: 1;
  min-width: calc(50% - 4px);
  padding: 12px 8px;
  border: 1px solid #333;
  border-radius: 10px;
  background: #1a1a1a;
  color: #ccc;
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}

.panel-btn:active {
  background: #333;
  border-color: #555;
}

.panel-btn.danger {
  border-color: #5c1a1a;
  color: #EF4444;
}

.panel-btn.danger:active {
  background: #3b1010;
}

.panel-divider {
  height: 1px;
  background: #222;
  margin: 6px 0;
}

.panel-title {
  font-size: 11px;
  color: #666;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.panel-hint {
  font-size: 11px;
  color: #555;
  line-height: 1.5;
  padding: 0 2px;
}

.share-btn {
  width: 100%;
  border-color: #3B82F6 !important;
  color: #3B82F6 !important;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: #1a1a1a;
  border-radius: 8px;
  border: 1px solid #222;
  font-size: 12px;
  gap: 8px;
}

.history-item .hi-time { color: #666; font-size: 11px; }
.history-item .hi-blue { color: #3B82F6; font-weight: 700; }
.history-item .hi-red { color: #EF4444; font-weight: 700; }
.history-item .hi-vs { color: #555; }

.history-del {
  background: none;
  border: 1px solid #5c1a1a;
  color: #EF4444;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
}

.history-del:active { background: #3b1010; }

#history-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
.empty-history { text-align: center; color: #444; font-size: 13px; padding: 20px 0; }

/* ===== Toast ===== */
#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #fff;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(4px);
}

#toast.success { border-color: #22c55e; color: #22c55e; }
#toast.error { border-color: #EF4444; color: #EF4444; }

/* ===== Fullscreen styles (via .fs-mode class) ===== */
#app.fs-mode {
  background: #000;
  overflow: hidden;
}

#app.fs-mode #buttons {
  display: none;
}

#app.fs-mode #panel-toggle {
  display: none;
}

#app.fs-mode #panel {
  display: none;
}

#app.fs-mode #hint {
  color: #555;
  font-size: 13px;
}

#app.fs-mode .team {
  cursor: default;
}
</style>
</head>
<body>

<div id="app">
  <div id="time">--:--</div>

  <div id="score-area">
    <div class="team blue" data-team="blue">
      <div class="team-label">蓝 队</div>
      <div class="team-score">0</div>
    </div>
    <div class="team red" data-team="red">
      <div class="team-label">红 队</div>
      <div class="team-score">0</div>
    </div>
  </div>

  <div id="hint">↑ 上滑加分 ↓ 下滑减分</div>

  <div id="buttons">
    <button class="btn" id="btn-reset">重置本局</button>
    <button class="btn fullscreen-btn" id="btn-fullscreen">全屏计分</button>
  </div>
</div>

<button id="panel-toggle">≡</button>

<div id="panel">
  <div id="panel-inner">
    <div class="panel-section">
      <button class="panel-btn" id="btn-save">保存本场记录</button>
      <button class="panel-btn" id="btn-new-game">新建对局清零</button>
    </div>
    <div class="panel-section">
      <button class="panel-btn" id="btn-copy">复制记录文本</button>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-title">分享页面给好友</div>
    <button class="panel-btn share-btn" id="btn-share-page">发送页面文件</button>
    <div class="panel-hint">点击"发送页面文件"可通过 AirDrop / 附近分享 直接发送给好友，对方浏览器直接打开。</div>
    <div class="panel-divider"></div>
    <div class="panel-title">历史记录</div>
    <div id="history-list"><div class="empty-history">暂无记录</div></div>
    <button class="panel-btn danger" id="btn-clear-all">一键清空全部记录</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== DOM refs ====================
const $app = document.getElementById('app');
const $time = document.getElementById('time');
const $scoreArea = document.getElementById('score-area');
const $hint = document.getElementById('hint');
const $panelToggle = document.getElementById('panel-toggle');
const $panel = document.getElementById('panel');
const $historyList = document.getElementById('history-list');
const $toast = document.getElementById('toast');

// ==================== State ====================
const state = {
  blueScore: 0,
  redScore: 0,
  isFullscreen: false,
  isPanelOpen: false,
  orientation: 'portrait'
};

// ==================== Storage ====================
const STORAGE_KEY = 'scoreboard_state';
const RECORDS_KEY = 'scoreboard_records';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      blueScore: state.blueScore,
      redScore: state.redScore
    }));
  } catch(e) { /* storage full or unavailable */ }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.blueScore = data.blueScore || 0;
      state.redScore = data.redScore || 0;
    }
  } catch(e) { /* ignore corrupt data */ }
}

function loadRecords() {
  try {
    const raw = localStorage.getItem(RECORDS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveRecords(records) {
  try {
    localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
  } catch(e) {
    showToast('存储空间不足', 'error');
  }
}

// ==================== UI Updates ====================
function updateScoreDisplay() {
  document.querySelector('.team.blue .team-score').textContent = state.blueScore;
  document.querySelector('.team.red .team-score').textContent = state.redScore;
}

function animateScore(team) {
  const el = document.querySelector(`.team.${team} .team-score`);
  el.classList.remove('score-pop');
  void el.offsetWidth;
  el.classList.add('score-pop');
}

function updateScore(team, delta) {
  if (team === 'blue') {
    state.blueScore = Math.max(0, state.blueScore + delta);
  } else {
    state.redScore = Math.max(0, state.redScore + delta);
  }
  updateScoreDisplay();
  animateScore(team);
  saveState();
}

function updateOrientationUI() {
  $hint.textContent = '↑ 上滑加分 ↓ 下滑减分';
  if (state.isFullscreen) {
    $hint.classList.add('fullscreen-hint');
  } else {
    $hint.classList.remove('fullscreen-hint');
  }
}

function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  $time.textContent = h + ':' + m;
}

function renderHistory() {
  const records = loadRecords();
  if (records.length === 0) {
    $historyList.innerHTML = '<div class="empty-history">暂无记录</div>';
    return;
  }
  $historyList.innerHTML = records.slice().reverse().map(r => `
    <div class="history-item">
      <span class="hi-time">${escapeHtml(r.datetime)}</span>
      <span class="hi-blue">蓝 ${r.blueScore}</span>
      <span class="hi-vs">:</span>
      <span class="hi-red">红 ${r.redScore}</span>
      <button class="history-del" data-id="${r.id}" title="删除">×</button>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==================== Toast ====================
let toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  $toast.textContent = msg;
  $toast.className = 'show ' + (type || '');
  toastTimer = setTimeout(() => { $toast.className = ''; }, 2000);
}

// ==================== Swipe Detection ====================
const SWIPE_THRESHOLD = 20;

function getSwipeDir(dx, dy) {
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < SWIPE_THRESHOLD) return null;
  // Always prioritize vertical swipe (up/down) to avoid browser side-swipe conflicts
  if (absDy > absDx) return dy < 0 ? 'up' : 'down';
  if (absDx > absDy) return dx > 0 ? 'right' : 'left';
  return null;
}

function initSwipe(teamEl) {
  let startX = 0, startY = 0;
  let tracking = false;

  teamEl.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });

  teamEl.addEventListener('touchmove', function(e) {
    if (!tracking) return;
    // Prevent page scroll while swiping on score area
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
      e.preventDefault();
    }
  }, { passive: false });

  teamEl.addEventListener('touchend', function(e) {
    if (!tracking) return;
    tracking = false;

    const touch = e.changedTouches[0];
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    const dir = getSwipeDir(dx, dy);
    const team = teamEl.dataset.team;

    if (!dir) return;

    if (dir === 'up') updateScore(team, 1);
    else if (dir === 'down') updateScore(team, -1);
  });
}

// ==================== Fullscreen ====================
function requestFS() {
  const el = $app;
  if (el.requestFullscreen) {
    el.requestFullscreen().catch(() => showToast('全屏模式不可用', 'error'));
  } else if (el.webkitRequestFullscreen) {
    el.webkitRequestFullscreen();
  }
}

function exitFS() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  }
}

function isFS() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}

function handleFSChange() {
  state.isFullscreen = isFS();
  if (state.isFullscreen) {
    closePanel();
    $app.classList.add('fs-mode');
  } else {
    $app.classList.remove('fs-mode');
  }
  updateOrientationUI();
}

// ==================== Panel ====================
function openPanel() {
  state.isPanelOpen = true;
  $panel.classList.add('open');
  $panelToggle.classList.add('open');
  renderHistory();
}

function closePanel() {
  state.isPanelOpen = false;
  $panel.classList.remove('open');
  $panelToggle.classList.remove('open');
}

function togglePanel() {
  if (state.isPanelOpen) closePanel();
  else openPanel();
}

// ==================== Actions ====================
function resetGame() {
  state.blueScore = 0;
  state.redScore = 0;
  updateScoreDisplay();
  saveState();
  showToast('已重置', 'success');
}

function newGame() {
  state.blueScore = 0;
  state.redScore = 0;
  updateScoreDisplay();
  saveState();
  showToast('新对局已开始', 'success');
}

function saveRecord() {
  if (state.blueScore === 0 && state.redScore === 0) {
    showToast('当前无分数记录', 'error');
    return;
  }
  const records = loadRecords();
  const now = new Date();
  const datetime = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0') + ' ' +
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');
  records.push({
    id: Date.now(),
    datetime: datetime,
    blueScore: state.blueScore,
    redScore: state.redScore
  });
  saveRecords(records);
  renderHistory();
  showToast('记录已保存', 'success');
}

function copyText() {
  const records = loadRecords();
  if (records.length === 0) {
    showToast('暂无记录可复制', 'error');
    return;
  }
  let text = '记分板 比赛记录\n';
  text += '─'.repeat(24) + '\n';
  records.forEach((r, i) => {
    text += `${i + 1}. ${r.datetime}\n   蓝队 ${r.blueScore} : 红队 ${r.redScore}\n`;
  });
  text += '─'.repeat(24);

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板', 'success');
    }).catch(() => {
      showToast('复制失败，请重试', 'error');
    });
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      showToast('已复制到剪贴板', 'success');
    } catch(e) {
      showToast('复制失败，请重试', 'error');
    }
    document.body.removeChild(ta);
  }
}


function deleteRecord(id) {
  const records = loadRecords();
  const filtered = records.filter(r => String(r.id) !== String(id));
  saveRecords(filtered);
  renderHistory();
  showToast('已删除', 'success');
}

async function sharePage() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const file = new File([html], '记分板.html', { type: 'text/html' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        title: '记分板',
        text: '篮球记分板页面',
        files: [file]
      });
      showToast('分享成功', 'success');
    } catch(e) {
      if (e.name !== 'AbortError') {
        showToast('分享失败，请重试', 'error');
      }
    }
  } else {
    // Fallback: download the file
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '记分板.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('已下载文件，可从文件管理器发送给好友', 'success');
  }
}



function clearAllRecords() {
  if (loadRecords().length === 0) {
    showToast('暂无记录', 'error');
    return;
  }
  if (confirm('确定要清空全部历史记录吗？此操作不可撤销。')) {
    saveRecords([]);
    renderHistory();
    showToast('已清空全部记录', 'success');
  }
}

// ==================== Event Bindings ====================
document.querySelectorAll('.team').forEach(el => initSwipe(el));

document.getElementById('btn-reset').addEventListener('click', resetGame);
document.getElementById('btn-fullscreen').addEventListener('click', requestFS);

$panelToggle.addEventListener('click', function(e) {
  e.stopPropagation();
  togglePanel();
});

// Close panel when clicking outside
document.addEventListener('click', function(e) {
  if (state.isPanelOpen && !$panel.contains(e.target) && e.target !== $panelToggle) {
    closePanel();
  }
});

// Fullscreen exit: click on black background, hint text, or gap between teams
$app.addEventListener('click', function(e) {
  if (!state.isFullscreen) return;
  const target = e.target;
  // Exit if clicking on: app container, score-area (gap between teams), or hint
  if (target === $app || target === $scoreArea || target === $hint) {
    exitFS();
  }
});

document.addEventListener('fullscreenchange', handleFSChange);
document.addEventListener('webkitfullscreenchange', handleFSChange);

// Panel buttons
document.getElementById('btn-save').addEventListener('click', saveRecord);
document.getElementById('btn-new-game').addEventListener('click', newGame);
document.getElementById('btn-copy').addEventListener('click', copyText);
document.getElementById('btn-share-page').addEventListener('click', sharePage);
document.getElementById('btn-clear-all').addEventListener('click', clearAllRecords);

// History list delete delegation
$historyList.addEventListener('click', function(e) {
  if (e.target.classList.contains('history-del')) {
    e.stopPropagation();
    const id = e.target.dataset.id;
    if (id) deleteRecord(id);
  }
});

// ==================== Init ====================
function init() {
  loadState();
  updateScoreDisplay();
  updateTime();
  setInterval(updateTime, 60000);
  updateOrientationUI();

  // Initial fullscreen state check
  if (isFS()) {
    state.isFullscreen = true;
    $app.classList.add('fs-mode');
    updateOrientationUI();
  }
}

init();
</script>

</body>
</html>
